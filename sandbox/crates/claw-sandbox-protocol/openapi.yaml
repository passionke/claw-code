openapi: 3.1.0
info:
  title: claw-sandbox API
  version: 0.1.0-p0
  description: |
    P0 implements legacy POST /v1/pool/rpc only (see legacy_rpc in claw-sandbox-protocol).
    P2+ adds /v1/sandbox/turns REST surface.
  contact:
    name: kejiqing
servers:
  - url: http://127.0.0.1:9944
    description: Local host sandbox
paths:
  /healthz/live-report:
    get:
      summary: Live report contract probe
      responses:
        "200":
          description: OK
  /v1/pool/rpc:
    post:
      summary: Legacy pool RPC (P0 migration compat)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoolRpcReq"
      responses:
        "200":
          description: RPC response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolRpcResp"
  /v1/sandbox/turns:
    post:
      summary: Submit async turn (P2+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TurnSpec"
      responses:
        "202":
          description: Accepted
  /v1/sandbox/capacity:
    get:
      summary: Pool capacity (P2+)
      responses:
        "200":
          description: Slot stats
components:
  schemas:
    PoolRpcReq:
      type: object
      description: See claw-sandbox-protocol legacy_rpc.rs
    PoolRpcResp:
      type: object
    TurnSpec:
      type: object
