# Dev: push workflow changes to feat/github-ci-deploy; Run workflow on that branch (no merge-to-main loop).
# Promote to main only when CI contract is stable.
# Env: Settings → Secrets and variables → Actions → deploy/stack/docs/github-ci-variables.md
# Author: kejiqing
name: claw-ci-deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build/deploy"
        required: true
        default: feat/github-ci-deploy
        type: string
      skip_dual_deploy:
        description: "Skip ci-cluster-dual-deploy (node B)"
        required: false
        default: false
        type: boolean
      disk_prune_only:
        description: "Only run maintenance disk-prune (no build/deploy)"
        required: false
        default: false
        type: boolean

concurrency:
  group: claw-deploy
  cancel-in-progress: false

env:
  GIT_CLEAN_FLAGS: "-ffd"
  CLAW_DEPLOY_PROFILE: production
  CLAW_CONTAINER_RUNTIME: docker
  CLAW_IMAGE_PREFIX: local
  CLAW_RELEASE_SKIP_PULL: "1"
  # Contabo SG (62.72.45.75): use crates.io / rust-lang.org; rsproxy.cn times out from Singapore.
  CLAW_USE_CN_CRATES_MIRROR: "0"
  CLAW_USE_CN_RUST_MIRROR: "0"
  CLAW_POOL_ADVERTISE_HOST: "62.72.45.75"
  CLAW_CLUSTER_ID: github-ci-01
  CLAW_POOL_ID: pool-github-ci-01
  CLAW_CI_NODE_B_POOL_ID: pool-github-ci-02
  # GHA runner kills nohup claw-sandbox when job ends; docker container survives (same as compose).
  CLAW_POOL_SUPERVISOR: docker
  CLAW_POOL_DAEMON_USE_SYSTEMD: "0"
  CLAW_AUTO_BOOTSTRAP: "1"
  CLAW_BOOTSTRAP_LLM_FORCE: "1"
  CONTAINER_BASE_REGISTRY: docker.1ms.run
  # SG runner: GHCR tap; Sunmi CN CI uses ACR (render-env-from-ci.sh default).
  CLAUDE_TAP_IMAGE: ghcr.io/passionke/claude-tap:latest
  # Public CI host: admin on 18675, full-site login (not default local dev).
  GATEWAY_PLAYGROUND_HOST_PORT: "18675"
  PLAYGROUND_ADMIN_CHAT_PUBLIC: "0"
  # Gateway/worker probe tap on compose DNS; browser Live uses public host :3000.
  CLAUDE_TAP_ADMIN_HOST: claw-claude-tap
  CLAUDE_TAP_LIVE_ADVERTISE_HOST: "62.72.45.75"
  CLAUDE_TAP_PUBLISH_PROXY: "127.0.0.1:8080:8080"

jobs:
  maintenance:
    if: inputs.disk_prune_only
    runs-on: [self-hosted, contabo-sg]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          clean: false
      - name: Sync worktree
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: source ./deploy/stack/lib/ci-sync-worktree-github.sh
      - name: Disk prune
        run: ./deploy/stack/lib/ci-disk-prune.sh

  release:
    if: ${{ !inputs.disk_prune_only }}
    runs-on: [self-hosted, contabo-sg]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          clean: false

      - name: Sync worktree
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: source ./deploy/stack/lib/ci-sync-worktree-github.sh

      - name: Render .env (build)
        env:
          CLAW_CI_REQUIRE_LLM_BOOTSTRAP: "0"
        run: ./deploy/stack/lib/render-env-from-ci.sh

      - name: Build release images
        run: |
          ./deploy/stack/gateway.sh build --no-clean local
          PREFIX="${CLAW_IMAGE_PREFIX:-local}"
          TAG="${CLAW_RELEASE_TAG}"
          docker tag claw-gateway-rs:local "${PREFIX}/claw-code:${TAG}"
          docker tag claw-gateway-worker:local "${PREFIX}/claw-gateway-worker:${TAG}"
          docker tag claw-gateway-worker-relaxed:local "${PREFIX}/claw-gateway-worker-relaxed:${TAG}"
          docker tag claw-gateway-playground:local "${PREFIX}/claw-gateway-playground:${TAG}"
          echo "built ${PREFIX}/claw-code:${TAG} (+ strict/relaxed worker, playground)"

      - name: Render .env (deploy)
        env:
          CLAW_CI_REQUIRE_LLM_BOOTSTRAP: "1"
          CLAW_CI_REQUIRE_ADMIN_AUTH: "1"
          CLAW_BOOTSTRAP_LLM_API_KEY: ${{ secrets.CLAW_BOOTSTRAP_LLM_API_KEY }}
          CLAW_BOOTSTRAP_LLM_BASE_URL: ${{ vars.CLAW_BOOTSTRAP_LLM_BASE_URL }}
          CLAW_BOOTSTRAP_LLM_MODEL_NAME: ${{ vars.CLAW_BOOTSTRAP_LLM_MODEL_NAME }}
          CLAW_BOOTSTRAP_LLM_NAME: ${{ vars.CLAW_BOOTSTRAP_LLM_NAME }}
          CLAW_BOOTSTRAP_LLM_FORCE: "1"
          PLAYGROUND_ADMIN_USER: ${{ vars.PLAYGROUND_ADMIN_USER }}
          PLAYGROUND_ADMIN_PASSWORD: ${{ secrets.PLAYGROUND_ADMIN_PASSWORD }}
          PLAYGROUND_ADMIN_SESSION_SECRET: ${{ secrets.PLAYGROUND_ADMIN_SESSION_SECRET }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL }}
          CLAW_OTEL_ENABLED: ${{ vars.CLAW_OTEL_ENABLED }}
          CLAW_OTEL_LOG_PROMPTS: ${{ vars.CLAW_OTEL_LOG_PROMPTS }}
        run: ./deploy/stack/lib/render-env-from-ci.sh

      - name: Cleanup prior node B
        run: ./deploy/stack/lib/ci-cluster-cleanup.sh

      - name: Up release stack
        run: ./deploy/stack/gateway.sh up --release "${CLAW_RELEASE_TAG}"

      - name: Verify stack
        run: ./deploy/stack/gateway.sh verify

      - name: Admin solve e2e (round 1)
        run: ./deploy/stack/lib/admin-solve-e2e.sh 1 ping

      - name: Admin solve e2e (round 2)
        run: ./deploy/stack/lib/admin-solve-e2e.sh 1 ping

      - name: Dual deploy node B
        if: ${{ !inputs.skip_dual_deploy }}
        run: ./deploy/stack/lib/ci-cluster-dual-deploy.sh
