# Publishes gateway + pool worker images to GHCR, then mirrors the same layers to ACR.
# Author: kejiqing
#
# Chain:
# - Push tag refs/tags/release-v* → pick-runner → linux-compile-once (single Rust build) → prebuilt images
#   claw-code, claw-gateway-worker, claw-gateway-playground (same tag).
# - build-and-push-relaxed-worker: FROM strict worker image.
# - mirror-to-acr: pull GHCR tags → retag → push ACR (no second Rust compile).
#
# Runner selection (Author: kejiqing):
# - Prefer online repo self-hosted Linux/X64; if none / probe fails, fall back to ubuntu-latest.
# - pick-runner always uses github-hosted so selection itself cannot hang on a dead self-host.
# - Listing runners needs Administration: Read. Default GITHUB_TOKEN cannot call that API (403);
#   set repo secret ACTIONS_RUNNER_LIST_TOKEN (classic PAT with repo admin, or fine-grained
#   Administration: Read) to enable real self-hosted preference. Without it, always github-hosted.
#
# Optional repo/org Actions variable CONTAINER_BASE_REGISTRY (hostname only, no path):
# - unset → docker.io (recommended on github-hosted runners; mirrors may serve incomplete blobs).
# - example → docker.1ms.run → pulls library/rust + library/debian from that mirror.
name: claw-code-image

on:
  push:
    tags:
      - "release-v*"

permissions:
  contents: read
  packages: write

jobs:
  pick-runner:
    name: pick runner (self-hosted or github)
    if: startsWith(github.ref, 'refs/tags/release-v')
    runs-on: ubuntu-latest
    outputs:
      runs_on: ${{ steps.pick.outputs.runs_on }}
      runner_choice: ${{ steps.pick.outputs.runner_choice }}
    steps:
      - name: Prefer online self-hosted Linux/X64; else ubuntu-latest
        id: pick
        uses: actions/github-script@v7
        with:
          # Optional PAT: Administration Read on this repo. Author: kejiqing
          github-token: ${{ secrets.ACTIONS_RUNNER_LIST_TOKEN || github.token }}
          script: |
            function useGithubHosted(reason) {
              core.warning(`${reason}; falling back to ubuntu-latest`);
              core.setOutput("runs_on", JSON.stringify(["ubuntu-latest"]));
              core.setOutput("runner_choice", "github-hosted:ubuntu-latest");
            }
            let runners;
            try {
              runners = await github.paginate(
                github.rest.actions.listSelfHostedRunnersForRepo,
                { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
              );
            } catch (err) {
              const status = err && err.status;
              useGithubHosted(
                `list self-hosted runners failed (status=${status || "unknown"}): ${err.message}`
              );
              return;
            }
            const match = runners.find((r) => {
              if (r.status !== "online") return false;
              const names = new Set((r.labels || []).map((l) => l.name));
              return names.has("self-hosted") && names.has("Linux") && names.has("X64");
            });
            if (match) {
              core.info(`Using self-hosted runner: ${match.name} (busy=${match.busy})`);
              core.setOutput(
                "runs_on",
                JSON.stringify(["self-hosted", "Linux", "X64"])
              );
              core.setOutput("runner_choice", `self-hosted:${match.name}`);
            } else {
              useGithubHosted("No online self-hosted Linux/X64 runner");
            }

  linux-compile-once:
    if: startsWith(github.ref, 'refs/tags/release-v')
    needs: pick-runner
    runs-on: ${{ fromJSON(needs.pick-runner.outputs.runs_on) }}
    steps:
      - name: Show runner choice
        run: |
          echo "runner_choice=${{ needs.pick-runner.outputs.runner_choice }}"
          echo "runs_on=${{ needs.pick-runner.outputs.runs_on }}"
          echo "hostname=$(hostname)"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build base images
        id: base_images
        env:
          CONTAINER_BASE_REGISTRY: ${{ vars.CONTAINER_BASE_REGISTRY }}
        run: |
          set -euo pipefail
          REG="${CONTAINER_BASE_REGISTRY:-}"
          if [ -z "${REG}" ]; then
            REG="docker.io"
          fi
          RUST_IMAGE="${REG}/library/rust:1.88-bookworm"
          DEBIAN_IMAGE="${REG}/library/debian:bookworm-slim"
          NODE_IMAGE="${REG}/library/node:20-alpine"
          echo "container_base_registry=${REG}" >> "$GITHUB_OUTPUT"
          echo "rust_image=${RUST_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "debian_image=${DEBIAN_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "node_image=${NODE_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Restore linux-compile cache
        uses: actions/cache@v4
        with:
          path: |
            .ci-cache/cargo-registry
            .ci-cache/cargo-git
            .ci-cache/sccache
          key: linux-compile-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock', 'deploy/stack/Containerfile.rust-compile') }}
          restore-keys: |
            linux-compile-${{ runner.os }}-

      - name: Linux compile (once)
        env:
          CLAW_CONTAINER_RUNTIME: docker
          CLAW_LINUX_COMPILE_CI: "1"
          CLAW_USE_CN_CRATES_MIRROR: "0"
          CLAW_USE_CN_RUST_MIRROR: "0"
          CONTAINER_BASE_REGISTRY: ${{ steps.base_images.outputs.container_base_registry }}
        run: bash deploy/stack/lib/linux-compile.sh

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: deploy/stack/.linux-artifacts/release/
          if-no-files-found: error
          retention-days: 1

  build-and-push:
    if: startsWith(github.ref, 'refs/tags/release-v')
    needs:
      - pick-runner
      - linux-compile-once
    runs-on: ${{ fromJSON(needs.pick-runner.outputs.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: claw-code
            dockerfile: deploy/stack/Containerfile.gateway-rs.prebuilt
          - package: claw-gateway-worker
            dockerfile: deploy/stack/Containerfile.gateway-worker.prebuilt
          - package: claw-gateway-playground
            dockerfile: deploy/stack/Containerfile.gateway-playground
    steps:
      - name: Show runner choice
        run: |
          echo "runner_choice=${{ needs.pick-runner.outputs.runner_choice }}"
          echo "hostname=$(hostname)"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Download linux artifacts
        if: matrix.package != 'claw-gateway-playground'
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: deploy/stack/.linux-artifacts/release

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/release-')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build base images
        id: base_images
        env:
          CONTAINER_BASE_REGISTRY: ${{ vars.CONTAINER_BASE_REGISTRY }}
        run: |
          set -euo pipefail
          REG="${CONTAINER_BASE_REGISTRY:-}"
          if [ -z "${REG}" ]; then
            REG="docker.io"
          fi
          RUST_IMAGE="${REG}/library/rust:1.88-bookworm"
          DEBIAN_IMAGE="${REG}/library/debian:bookworm-slim"
          NODE_IMAGE="${REG}/library/node:20-alpine"
          echo "container_base_registry=${REG}" >> "$GITHUB_OUTPUT"
          echo "rust_image=${RUST_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "debian_image=${DEBIAN_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "node_image=${NODE_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Image tags (GHCR)
        id: meta
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.package }}"
          SHA12="${GITHUB_SHA:0:12}"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha12=${SHA12}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${RELEASE_TAG}"
            echo "${IMAGE}:sha-${SHA12}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.package }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: ${{ startsWith(github.ref, 'refs/tags/release-v') }}
          build-args: |
            DEBIAN_BASE_IMAGE=${{ steps.base_images.outputs.debian_image }}
            NODE_BASE_IMAGE=${{ steps.base_images.outputs.node_image }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Verify playground admin assets in image
        if: matrix.package == 'claw-gateway-playground'
        run: |
          set -euo pipefail
          IMG="${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.release_tag }}"
          docker run --rm "${IMG}" sh -c 'test -f /app/admin-dist/index.html && test -n "$(ls /app/admin-dist/assets/*.js 2>/dev/null)"'
          echo "playground admin-dist ok in ${IMG}"

  build-and-push-relaxed-worker:
    if: startsWith(github.ref, 'refs/tags/release-v')
    needs:
      - pick-runner
      - build-and-push
    runs-on: ${{ fromJSON(needs.pick-runner.outputs.runs_on) }}
    steps:
      - name: Show runner choice
        run: |
          echo "runner_choice=${{ needs.pick-runner.outputs.runner_choice }}"
          echo "hostname=$(hostname)"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags (GHCR)
        id: meta
        run: |
          set -euo pipefail
          STRICT_IMAGE="ghcr.io/${{ github.repository_owner }}/claw-gateway-worker"
          RELAXED_IMAGE="ghcr.io/${{ github.repository_owner }}/claw-gateway-worker-relaxed"
          SHA12="${GITHUB_SHA:0:12}"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          echo "strict_image=${STRICT_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "relaxed_image=${RELAXED_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${RELAXED_IMAGE}:${RELEASE_TAG}"
            echo "${RELAXED_IMAGE}:sha-${SHA12}"
            echo "${RELAXED_IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Pull strict worker base
        run: |
          set -euo pipefail
          docker pull "${{ steps.meta.outputs.strict_image }}:${{ steps.meta.outputs.release_tag }}"

      - name: Build and push claw-gateway-worker-relaxed
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/stack/Containerfile.gateway-worker-relaxed
          push: true
          build-args: |
            WORKER_BASE_IMAGE=${{ steps.meta.outputs.strict_image }}:${{ steps.meta.outputs.release_tag }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Verify relaxed worker tools in image
        run: |
          set -euo pipefail
          IMG="${{ steps.meta.outputs.relaxed_image }}:${{ steps.meta.outputs.release_tag }}"
          docker run --rm --entrypoint sh "${IMG}" -c 'command -v curl && command -v git && command -v python3'
          echo "relaxed worker curl/git/python3 ok in ${IMG}"

  mirror-to-acr:
    if: startsWith(github.ref, 'refs/tags/release-v')
    needs:
      - pick-runner
      - build-and-push
      - build-and-push-relaxed-worker
    runs-on: ${{ fromJSON(needs.pick-runner.outputs.runs_on) }}
    environment: ${{ vars.ACR_GITHUB_ENVIRONMENT || 'claw-acr' }}
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        package:
          - claw-code
          - claw-gateway-worker
          - claw-gateway-worker-relaxed
          - claw-gateway-playground
    steps:
      - name: Show runner choice
        run: |
          echo "runner_choice=${{ needs.pick-runner.outputs.runner_choice }}"
          echo "hostname=$(hostname)"

      - name: Verify ACR_REGISTRY and derive login host
        id: reg
        env:
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
        run: |
          set -euo pipefail
          if [ -z "${ACR_REGISTRY}" ]; then
            echo "::error::ACR_REGISTRY is empty. Set on GitHub Environment (default claw-acr) or repo variable ACR_GITHUB_ENVIRONMENT." >&2
            exit 1
          fi
          LOGIN_HOST="${ACR_REGISTRY%%/*}"
          echo "login_host=${LOGIN_HOST}" >> "$GITHUB_OUTPUT"
          echo "image_prefix=${ACR_REGISTRY}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.reg.outputs.login_host }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Mirror ${{ matrix.package }} GHCR → ACR
        env:
          PACKAGE: ${{ matrix.package }}
          PREFIX: ${{ steps.reg.outputs.image_prefix }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          SHA12="${GITHUB_SHA:0:12}"
          GHCR_IMAGE="ghcr.io/${{ github.repository_owner }}/${PACKAGE}"
          ACR_IMAGE="${PREFIX}/${PACKAGE}"
          docker pull "${GHCR_IMAGE}:${RELEASE_TAG}"
          for tag in "${RELEASE_TAG}" "sha-${SHA12}" latest; do
            docker tag "${GHCR_IMAGE}:${RELEASE_TAG}" "${ACR_IMAGE}:${tag}"
            docker push "${ACR_IMAGE}:${tag}"
          done
          echo "mirrored ${GHCR_IMAGE}:${RELEASE_TAG} → ${ACR_IMAGE} (${RELEASE_TAG}, sha-${SHA12}, latest)"

      - name: Verify playground admin assets in ACR image
        if: matrix.package == 'claw-gateway-playground'
        env:
          PREFIX: ${{ steps.reg.outputs.image_prefix }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          IMG="${PREFIX}/claw-gateway-playground:${RELEASE_TAG}"
          docker run --rm "${IMG}" sh -c 'test -f /app/admin-dist/index.html && test -n "$(ls /app/admin-dist/assets/*.js 2>/dev/null)"'
          echo "playground admin-dist ok in ${IMG}"
