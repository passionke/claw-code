# Publishes gateway + pool worker images to GHCR, then mirrors the same layers to ACR.
# Author: kejiqing
#
# Chain:
# - Push tag refs/tags/release-v* → build + push claw-code, claw-gateway-worker,
#   claw-gateway-worker-relaxed (FROM strict worker), claw-gateway-playground (same tag).
# - mirror-to-acr: pull GHCR tags → retag → push ACR (no second Rust compile).
#
# Optional repo/org Actions variable CONTAINER_BASE_REGISTRY (hostname only, no path):
# - unset → docker.io (recommended on github-hosted runners; mirrors may serve incomplete blobs).
# - example → docker.1ms.run → pulls library/rust + library/debian from that mirror.
name: claw-code-image

on:
  push:
    tags:
      - "release-v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: startsWith(github.ref, 'refs/tags/release-v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: claw-code
            dockerfile: deploy/stack/Containerfile.gateway-rs
          - package: claw-gateway-worker
            dockerfile: deploy/stack/Containerfile.gateway-worker
          - package: claw-gateway-playground
            dockerfile: deploy/stack/Containerfile.gateway-playground
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Verify image rust/sandbox layout
        if: matrix.package == 'claw-code' || matrix.package == 'claw-gateway-worker'
        run: bash deploy/stack/lib/verify-image-rust-layout.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/release-')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build base images
        id: base_images
        env:
          CONTAINER_BASE_REGISTRY: ${{ vars.CONTAINER_BASE_REGISTRY }}
        run: |
          set -euo pipefail
          REG="${CONTAINER_BASE_REGISTRY:-}"
          if [ -z "${REG}" ]; then
            REG="docker.io"
          fi
          RUST_IMAGE="${REG}/library/rust:1.88-bookworm"
          DEBIAN_IMAGE="${REG}/library/debian:bookworm-slim"
          NODE_IMAGE="${REG}/library/node:20-alpine"
          echo "container_base_registry=${REG}" >> "$GITHUB_OUTPUT"
          echo "rust_image=${RUST_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "debian_image=${DEBIAN_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "node_image=${NODE_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Image tags (GHCR)
        id: meta
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.package }}"
          SHA12="${GITHUB_SHA:0:12}"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha12=${SHA12}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${RELEASE_TAG}"
            echo "${IMAGE}:sha-${SHA12}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.package }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: ${{ startsWith(github.ref, 'refs/tags/release-v') }}
          build-args: |
            RUST_BASE_IMAGE=${{ steps.base_images.outputs.rust_image }}
            DEBIAN_BASE_IMAGE=${{ steps.base_images.outputs.debian_image }}
            NODE_BASE_IMAGE=${{ steps.base_images.outputs.node_image }}
            RUSTUP_DIST_SERVER=https://static.rust-lang.org
            RUSTUP_UPDATE_ROOT=https://static.rust-lang.org/rustup
          tags: ${{ steps.meta.outputs.tags }}

      - name: Verify playground admin assets in image
        if: matrix.package == 'claw-gateway-playground'
        run: |
          set -euo pipefail
          IMG="${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.release_tag }}"
          docker run --rm "${IMG}" sh -c 'test -f /app/admin-dist/index.html && test -n "$(ls /app/admin-dist/assets/*.js 2>/dev/null)"'
          echo "playground admin-dist ok in ${IMG}"

  build-and-push-relaxed-worker:
    if: startsWith(github.ref, 'refs/tags/release-v')
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags (GHCR)
        id: meta
        run: |
          set -euo pipefail
          STRICT_IMAGE="ghcr.io/${{ github.repository_owner }}/claw-gateway-worker"
          RELAXED_IMAGE="ghcr.io/${{ github.repository_owner }}/claw-gateway-worker-relaxed"
          SHA12="${GITHUB_SHA:0:12}"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          echo "strict_image=${STRICT_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "relaxed_image=${RELAXED_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${RELAXED_IMAGE}:${RELEASE_TAG}"
            echo "${RELAXED_IMAGE}:sha-${SHA12}"
            echo "${RELAXED_IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Pull strict worker base
        run: |
          set -euo pipefail
          docker pull "${{ steps.meta.outputs.strict_image }}:${{ steps.meta.outputs.release_tag }}"

      - name: Build and push claw-gateway-worker-relaxed
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/stack/Containerfile.gateway-worker-relaxed
          push: true
          build-args: |
            WORKER_BASE_IMAGE=${{ steps.meta.outputs.strict_image }}:${{ steps.meta.outputs.release_tag }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Verify relaxed worker tools in image
        run: |
          set -euo pipefail
          IMG="${{ steps.meta.outputs.relaxed_image }}:${{ steps.meta.outputs.release_tag }}"
          docker run --rm --entrypoint sh "${IMG}" -c 'command -v curl && command -v git && command -v python3'
          echo "relaxed worker curl/git/python3 ok in ${IMG}"

  mirror-to-acr:
    if: startsWith(github.ref, 'refs/tags/release-v')
    needs:
      - build-and-push
      - build-and-push-relaxed-worker
    runs-on: ubuntu-latest
    environment: ${{ vars.ACR_GITHUB_ENVIRONMENT || 'claw-acr' }}
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        package:
          - claw-code
          - claw-gateway-worker
          - claw-gateway-worker-relaxed
          - claw-gateway-playground
    steps:
      - name: Verify ACR_REGISTRY and derive login host
        id: reg
        env:
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
        run: |
          set -euo pipefail
          if [ -z "${ACR_REGISTRY}" ]; then
            echo "::error::ACR_REGISTRY is empty. Set on GitHub Environment (default claw-acr) or repo variable ACR_GITHUB_ENVIRONMENT." >&2
            exit 1
          fi
          LOGIN_HOST="${ACR_REGISTRY%%/*}"
          echo "login_host=${LOGIN_HOST}" >> "$GITHUB_OUTPUT"
          echo "image_prefix=${ACR_REGISTRY}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.reg.outputs.login_host }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Mirror ${{ matrix.package }} GHCR → ACR
        env:
          PACKAGE: ${{ matrix.package }}
          PREFIX: ${{ steps.reg.outputs.image_prefix }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          SHA12="${GITHUB_SHA:0:12}"
          GHCR_IMAGE="ghcr.io/${{ github.repository_owner }}/${PACKAGE}"
          ACR_IMAGE="${PREFIX}/${PACKAGE}"
          docker pull "${GHCR_IMAGE}:${RELEASE_TAG}"
          for tag in "${RELEASE_TAG}" "sha-${SHA12}" latest; do
            docker tag "${GHCR_IMAGE}:${RELEASE_TAG}" "${ACR_IMAGE}:${tag}"
            docker push "${ACR_IMAGE}:${tag}"
          done
          echo "mirrored ${GHCR_IMAGE}:${RELEASE_TAG} → ${ACR_IMAGE} (${RELEASE_TAG}, sha-${SHA12}, latest)"

      - name: Verify playground admin assets in ACR image
        if: matrix.package == 'claw-gateway-playground'
        env:
          PREFIX: ${{ steps.reg.outputs.image_prefix }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          IMG="${PREFIX}/claw-gateway-playground:${RELEASE_TAG}"
          docker run --rm "${IMG}" sh -c 'test -f /app/admin-dist/index.html && test -n "$(ls /app/admin-dist/assets/*.js 2>/dev/null)"'
          echo "playground admin-dist ok in ${IMG}"

