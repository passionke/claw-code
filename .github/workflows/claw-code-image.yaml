name: claw-code-image

on:
  push:
    paths:
      - "third_party/doris-mcp/**"
      - ".github/workflows/claw-code-image.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/claw-code"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE}:sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "latest_tag=${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push (sha)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./third_party/doris-mcp/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.sha_tag }}

      - name: Build and push (latest)
        if: github.ref_name == 'main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./third_party/doris-mcp/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.latest_tag }}
