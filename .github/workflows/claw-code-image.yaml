name: claw-code-image

on:
  push:
    tags:
      - "release-*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # Only package release tags; do not build on main (or other branches).
    if: startsWith(github.ref, 'refs/tags/release-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build base images
        id: base_images
        run: |
          set -euo pipefail
          RUST_IMAGE="docker.1ms.run/library/rust:1.88-bookworm"
          if ! docker buildx imagetools inspect "${RUST_IMAGE}" >/dev/null 2>&1; then
            echo "mirror miss for rust image, fallback to docker.io"
            RUST_IMAGE="docker.io/library/rust:1.88-bookworm"
          fi
          echo "rust_image=${RUST_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Image tags (sha-12 + latest)
        id: meta
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/claw-code"
          SHA12="${GITHUB_SHA:0:12}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha12=${SHA12}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:sha-${SHA12}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/podman/Containerfile.gateway-rs
          push: true
          build-args: |
            RUST_BASE_IMAGE=${{ steps.base_images.outputs.rust_image }}
          tags: ${{ steps.meta.outputs.tags }}
