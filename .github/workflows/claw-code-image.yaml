name: claw-code-image

on:
  push:
    paths:
      - "third_party/doris-mcp/**"
      - ".github/workflows/claw-code-image.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build base images
        id: base_images
        run: |
          set -euo pipefail
          NODE_IMAGE="docker.1ms.run/library/node:20-bookworm-slim"
          RUST_IMAGE="docker.1ms.run/library/rust:1.88-bookworm"
          if ! docker buildx imagetools inspect "${NODE_IMAGE}" >/dev/null 2>&1; then
            echo "mirror miss for node image, fallback to docker.io"
            NODE_IMAGE="docker.io/library/node:20-bookworm-slim"
          fi
          if ! docker buildx imagetools inspect "${RUST_IMAGE}" >/dev/null 2>&1; then
            echo "mirror miss for rust image, fallback to docker.io"
            RUST_IMAGE="docker.io/library/rust:1.88-bookworm"
          fi
          echo "node_image=${NODE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "rust_image=${RUST_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/claw-code"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE}:sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "latest_tag=${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push (sha)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./third_party/doris-mcp/Containerfile
          push: true
          build-args: |
            NODE_BASE_IMAGE=${{ steps.base_images.outputs.node_image }}
            RUST_BASE_IMAGE=${{ steps.base_images.outputs.rust_image }}
          tags: ${{ steps.meta.outputs.sha_tag }}

      - name: Build and push (latest)
        if: github.ref_name == 'main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./third_party/doris-mcp/Containerfile
          push: true
          build-args: |
            NODE_BASE_IMAGE=${{ steps.base_images.outputs.node_image }}
            RUST_BASE_IMAGE=${{ steps.base_images.outputs.rust_image }}
          tags: ${{ steps.meta.outputs.latest_tag }}
