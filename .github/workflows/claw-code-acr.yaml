# Publishes gateway + worker images to Azure Container Registry (same tag family as GHCR).
# Trigger: push tag release-vx.y.z (same pattern as claw-code-image.yaml). Author: kejiqing
#
# Configure in GitHub → Settings → Secrets and variables → Actions:
#   Secrets:  ACR_USERNAME, ACR_PASSWORD
#   Variables: ACR_REGISTRY  (login server only, e.g. myregistry.azurecr.io — no https:// path)
#
# Image paths: ${ACR_REGISTRY}/claw-code:${RELEASE_TAG} and ${ACR_REGISTRY}/claw-gateway-worker:${RELEASE_TAG}
# plus :sha-<12> and :latest on each repository (mirrors GHCR tagging).
name: claw-code-acr

on:
  push:
    tags:
      - "release-v*.*.*"

permissions:
  contents: read

jobs:
  build-and-push-acr:
    if: startsWith(github.ref, 'refs/tags/release-v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: claw-code
            dockerfile: deploy/podman/Containerfile.gateway-rs
          - package: claw-gateway-worker
            dockerfile: deploy/podman/Containerfile.gateway-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify ACR registry variable
        env:
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
        run: |
          set -euo pipefail
          if [ -z "${ACR_REGISTRY}" ]; then
            echo "::error::Set Actions repository variable ACR_REGISTRY (login server only, e.g. myregistry.azurecr.io)." >&2
            exit 1
          fi

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Resolve build base images
        id: base_images
        env:
          CONTAINER_BASE_REGISTRY: ${{ vars.CONTAINER_BASE_REGISTRY }}
        run: |
          set -euo pipefail
          REG="${CONTAINER_BASE_REGISTRY:-}"
          if [ -z "${REG}" ]; then
            REG="docker.io"
          fi
          RUST_IMAGE="${REG}/library/rust:1.88-bookworm"
          DEBIAN_IMAGE="${REG}/library/debian:bookworm-slim"
          echo "container_base_registry=${REG}" >> "$GITHUB_OUTPUT"
          echo "rust_image=${RUST_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "debian_image=${DEBIAN_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Image tags (ACR)
        id: meta
        env:
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
        run: |
          set -euo pipefail
          IMAGE="${ACR_REGISTRY}/${{ matrix.package }}"
          SHA12="${GITHUB_SHA:0:12}"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha12=${SHA12}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${RELEASE_TAG}"
            echo "${IMAGE}:sha-${SHA12}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.package }} to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: ${{ startsWith(github.ref, 'refs/tags/release-v') }}
          build-args: |
            RUST_BASE_IMAGE=${{ steps.base_images.outputs.rust_image }}
            DEBIAN_BASE_IMAGE=${{ steps.base_images.outputs.debian_image }}
            RUSTUP_DIST_SERVER=https://static.rust-lang.org
            RUSTUP_UPDATE_ROOT=https://static.rust-lang.org/rustup
          tags: ${{ steps.meta.outputs.tags }}
