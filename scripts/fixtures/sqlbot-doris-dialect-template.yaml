# SQLBot 数据库方言模板 — Apache Doris 2.0（pre 粘贴用）
# Author: kejiqing
# 在 SQLBot Admin「数据库方言管理」整段替换 template 节点内容。

template:
  quot_rule: |
    <rule>
      必须对数据库名、表名、字段名、别名外层加反引号（`）。
      <note>
        1. 点号（.）不能包含在反引号内，必须写成 `database`.`table`
        2. 当标识符为关键字、含特殊字符或需保留大小写时必须加反引号
        3. Doris 标识符默认不区分大小写，但建议统一使用反引号
      </note>
    </rule>

  limit_rule: |
    <rule>
      当需要限制行数时，必须使用标准的LIMIT语法
      <note>
        1. 标准写法：LIMIT [count]
        2. 分页写法：LIMIT [count] OFFSET [start]
        3. 支持 MySQL 兼容写法：LIMIT [offset], [count]
      </note>
    </rule>

  other_rule: |
    <rule>必须为每个表生成别名（不加AS）</rule>
    {multi_table_condition}
    <rule>禁止使用星号(*)，必须明确字段名</rule>
    <rule>中文/特殊字符字段需保留原名并添加英文别名</rule>
    <rule>函数字段必须加别名</rule>
    <rule>百分比显示为：CONCAT(ROUND(x*100,2),'%')</rule>
    <rule>避免与Doris关键字冲突（如`rank`/`partition`/`values`）</rule>
    <rule>分区查询需使用PARTITION语句明确指定</rule>
    <rule>
      Apache Doris 禁止 CAST(expr AS SIGNED)（会触发 Syntax error: Encountered ')'
      <note>
        1. 需要显式类型转换时用 CAST(expr AS BIGINT)，禁止 SIGNED / UNSIGNED
        2. 字符串型数量字段（如 net_qty / sold_qty / order_cnt）优先直接 COALESCE，不必 CAST
        3. 推荐：COALESCE(`t`.`net_qty`, `t`.`sold_qty`, `t`.`order_cnt`) AS `sales_qty`
        4. 若必须 CAST：COALESCE(CAST(`t`.`net_qty` AS BIGINT), CAST(`t`.`sold_qty` AS BIGINT), CAST(`t`.`order_cnt` AS BIGINT)) AS `sales_qty`
      </note>
    </rule>

  basic_example: |
    <basic-examples>
      <intro>
        📌 以下示例严格遵循<Rules>中的 Doris 规范，展示符合要求的 SQL 写法与典型错误案例。
        ⚠️ 注意：示例中的表名、字段名均为演示虚构，实际使用时需替换为用户提供的真实标识符。
        🔍 重点观察：
          1. 反引号包裹所有数据库对象的规范用法
          2. 中英别名/百分比/函数等特殊字段的处理
          3. 关键字冲突的规避方式
          4. Doris 类型转换：禁止 AS SIGNED，用 BIGINT 或省略 CAST
      </intro>
      <example>
        <input>查询 test.orders 表的前100条订单（含中文字段和百分比）</input>
        <output-bad>
          SELECT * FROM test.orders LIMIT 100  -- 错误：使用星号
          SELECT `订单ID`, `金额` FROM `test`.`orders` `t1` LIMIT 100  -- 错误：缺少英文别名
          SELECT COUNT(`订单ID`) FROM `test`.`orders` `t1`  -- 错误：函数未加别名
        </output-bad>
        <output-good>
          SELECT 
            `t1`.`订单ID` AS `order_id`,
            `t1`.`金额` AS `amount`,
            COUNT(`t1`.`订单ID`) AS `total_orders`,
            CONCAT(ROUND(`t1`.`折扣率` * 100, 2), '%') AS `discount_percent`
          FROM `test`.`orders` `t1`
          LIMIT 100
        </output-good>
      </example>
    
      <example>
        <input>统计用户表 dw.users（含分区字段和关键字rank）的活跃占比</input>
        <output-bad>
          SELECT rank, status FROM dw.users  -- 错误：未处理关键字
          SELECT `rank`, ROUND(active_ratio*100) FROM `dw`.`users`  -- 错误：百分比格式错误
        </output-bad>
        <output-good>
          SELECT 
            `u`.`rank` AS `user_rank`,
            CONCAT(ROUND(`u`.`active_ratio` * 100, 2), '%') AS `active_percent`
          FROM `dw`.`users` `u`
          WHERE `u`.`status` = 1
          AND `u`.`dt` = '2024-01-01'  -- Doris分区字段过滤
          LIMIT 1000
        </output-good>
      </example>

      <example>
        <input>查询门店单品销量（net_qty 常为空，需回退 order_cnt）</input>
        <output-bad>
          SELECT `t1`.`spu_name`, CAST(`t1`.`net_qty` AS SIGNED) AS `sales_qty`
          FROM `biz_advice`.`ba_dws_item_store_d` `t1`
          WHERE `t1`.`store_id` = 'S001' AND `t1`.`stat_date` = '2026-06-14'
          LIMIT 100  -- 错误：Doris 不支持 AS SIGNED
          SELECT `t1`.`spu_name`, `t1`.`net_qty` AS `sales_qty`
          FROM `biz_advice`.`ba_dws_item_store_d` `t1`
          WHERE `t1`.`store_id` = 'S001'  -- 错误：net_qty 为空时勿直接当销量
        </output-bad>
        <output-good>
          SELECT
            `t1`.`spu_name` AS `product_name`,
            COALESCE(`t1`.`net_qty`, `t1`.`sold_qty`, `t1`.`order_cnt`) AS `sales_qty`
          FROM `biz_advice`.`ba_dws_item_store_d` `t1`
          WHERE `t1`.`store_id` = 'S001'
            AND `t1`.`stat_date` = '2026-06-14'
          LIMIT 100
        </output-good>
      </example>
    </basic-examples>

  example_engine: Apache Doris 2.0
  example_answer_1: |
    {"success":true,"sql":"SELECT `country` AS `country_name`, `continent` AS `continent_name`, `year` AS `year`, `gdp` AS `gdp_usd` FROM `Sample_Database`.`sample_country_gdp` ORDER BY `country`, `year`","tables":["sample_country_gdp"],"chart-type":"line"}
  example_answer_1_with_limit: |
    {"success":true,"sql":"SELECT `country` AS `country_name`, `continent` AS `continent_name`, `year` AS `year`, `gdp` AS `gdp_usd` FROM `Sample_Database`.`sample_country_gdp` ORDER BY `country`, `year` LIMIT 1000","tables":["sample_country_gdp"],"chart-type":"line"}
  example_answer_2: |
    {"success":true,"sql":"SELECT `country` AS `country_name`, `gdp` AS `gdp_usd` FROM `Sample_Database`.`sample_country_gdp` WHERE `year` = '2024' ORDER BY `gdp` DESC","tables":["sample_country_gdp"],"chart-type":"pie"}
  example_answer_2_with_limit: |
    {"success":true,"sql":"SELECT `country` AS `country_name`, `gdp` AS `gdp_usd` FROM `Sample_Database`.`sample_country_gdp` WHERE `year` = '2024' ORDER BY `gdp` DESC LIMIT 1000","tables":["sample_country_gdp"],"chart-type":"pie"}
  example_answer_3: |
    {"success":true,"sql":"SELECT `country` AS `country_name`, `gdp` AS `gdp_usd` FROM `Sample_Database`.`sample_country_gdp` WHERE `year` = '2025' AND `country` = '中国'","tables":["sample_country_gdp"],"chart-type":"table"}
  example_answer_3_with_limit: |
    {"success":true,"sql":"SELECT `country` AS `country_name`, `gdp` AS `gdp_usd` FROM `Sample_Database`.`sample_country_gdp` WHERE `year` = '2025' AND `country` = '中国' LIMIT 1000","tables":["sample_country_gdp"],"chart-type":"table"}
