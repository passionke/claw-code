# Doris cluster config template for MCP server.
# Do NOT commit real passwords.
# Author: kejiqing

clusters:
  example:
    host: 127.0.0.1
    port: 9030
    user: readonly_user
    password: "REPLACE_ME"
    default_database: sample_db
    ssl: false
    # Optional hard guard: only allow SQL to reference these tables.
    allowed_tables:
      - sample_table
      - sample_db.important_fact
    # Optional session vars injected before query as SET @KEY=value.
    env:
      TIMEZONE_HOUR_OFFSET: "0"
