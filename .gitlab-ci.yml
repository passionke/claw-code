# Sunmi CI: push any branch → build → deploy → admin-solve-e2e (no manual gate)
# Env: GitLab Settings → CI/CD → Variables → deploy/stack/docs/gitlab-ci-variables.md
# Author: kejiqing
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web" && $CLAW_DISK_PRUNE == "1"
    - if: $CI_COMMIT_BRANCH
    - when: never

# Default -ffdx removes ignored deploy/stack/claw-postgres-data (root-owned) → checkout fails.
variables:
  GIT_CLEAN_FLAGS: "-ffd"

stages:
  - maintenance
  - build
  - deploy

.variables:production-docker: &ci_production_docker
  CLAW_DEPLOY_PROFILE: production
  CLAW_CONTAINER_RUNTIME: docker
  CLAW_IMAGE_PREFIX: local
  CLAW_RELEASE_SKIP_PULL: "1"
  CLAW_USE_CN_CRATES_MIRROR: "1"
  CLAW_USE_CN_RUST_MIRROR: "1"
  CLAW_POOL_ADVERTISE_HOST: "10.22.28.94"
  CLAW_CLUSTER_ID: sunmi-ci-01
  CLAW_POOL_ID: pool-sunmi-ci-01
  # nohup dual pool — production default is systemd (see pool-daemon-systemd.sh); CI does not exercise that path
  CLAW_POOL_DAEMON_USE_SYSTEMD: "0"
  CLAW_AUTO_BOOTSTRAP: "1"

# Weekly: GitLab → CI/CD → Schedules (cron e.g. 0 4 * * 0, branch main). Manual: Run pipeline + CLAW_DISK_PRUNE=1.
maintenance:disk-prune:
  stage: maintenance
  resource_group: claw-deploy
  tags:
    - claw-dev
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web" && $CLAW_DISK_PRUNE == "1"
  script:
    - source ./deploy/stack/lib/ci-sync-worktree.sh
    - ./deploy/stack/lib/ci-disk-prune.sh
  timeout: 30m

build:release-images:
  stage: build
  resource_group: claw-deploy
  tags:
    - claw-dev
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH
  variables:
    <<: *ci_production_docker
    CLAW_CI_REQUIRE_LLM_BOOTSTRAP: "0"
  script:
    - source ./deploy/stack/lib/ci-sync-worktree.sh
    - ./deploy/stack/lib/render-env-from-ci.sh
    - ./deploy/stack/gateway.sh build --no-clean local
    - |
      PREFIX="${CLAW_IMAGE_PREFIX:-local}"
      TAG="${CLAW_RELEASE_TAG}"
      docker tag claw-gateway-rs:local "${PREFIX}/claw-code:${TAG}"
      docker tag claw-gateway-worker:local "${PREFIX}/claw-gateway-worker:${TAG}"
      docker tag claw-gateway-worker-relaxed:local "${PREFIX}/claw-gateway-worker-relaxed:${TAG}"
      docker tag claw-gateway-playground:local "${PREFIX}/claw-gateway-playground:${TAG}"
      echo "built ${PREFIX}/claw-code:${TAG} (+ strict/relaxed worker, playground)"
  timeout: 2h

deploy:release:
  stage: deploy
  resource_group: claw-deploy
  tags:
    - claw-dev
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH
  needs:
    - build:release-images
  variables:
    <<: *ci_production_docker
    CLAW_CI_REQUIRE_LLM_BOOTSTRAP: "1"
  script:
    - source ./deploy/stack/lib/ci-sync-worktree.sh
    - ./deploy/stack/lib/render-env-from-ci.sh
    - ./deploy/stack/gateway.sh up --release "${CLAW_RELEASE_TAG}"
    - ./deploy/stack/lib/admin-solve-e2e.sh 1 ping
  timeout: 2h
