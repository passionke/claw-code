# Sunmi CI: push main → build → deploy → admin-solve-e2e (no manual gate)
# Env: GitLab Settings → CI/CD → Variables → deploy/stack/docs/gitlab-ci-variables.md
# Author: kejiqing
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - when: never

stages:
  - build
  - deploy

.variables:production-docker: &ci_production_docker
  CLAW_DEPLOY_PROFILE: production
  CLAW_CONTAINER_RUNTIME: docker
  CLAW_IMAGE_PREFIX: local
  CLAW_RELEASE_SKIP_PULL: "1"
  CLAW_USE_CN_CRATES_MIRROR: "1"
  CLAW_POOL_ADVERTISE_HOST: "10.22.28.94"
  CLAW_CLUSTER_ID: sunmi-ci-01
  CLAW_POOL_ID: pool-sunmi-ci-01
  CLAW_AUTO_BOOTSTRAP: "1"

build:release-images:
  stage: build
  resource_group: claw-deploy
  tags:
    - claw-dev
  variables:
    <<: *ci_production_docker
    CLAW_RELEASE_TAG: "release-${CI_COMMIT_SHORT_SHA}"
  script:
    - cd "${CI_PROJECT_DIR:-/home/gitlab-runner/claw-code}"
    - git fetch origin && git checkout main && git pull --ff-only origin main
    - ./deploy/stack/lib/render-env-from-ci.sh
    - ./deploy/stack/gateway.sh build --no-clean local
    - |
      PREFIX="${CLAW_IMAGE_PREFIX:-local}"
      TAG="${CLAW_RELEASE_TAG}"
      docker tag claw-gateway-rs:local "${PREFIX}/claw-code:${TAG}"
      docker tag claw-gateway-worker:local "${PREFIX}/claw-gateway-worker:${TAG}"
      docker tag claw-gateway-playground:local "${PREFIX}/claw-gateway-playground:${TAG}"
      echo "built ${PREFIX}/claw-code:${TAG}"
  timeout: 2h

deploy:release:
  stage: deploy
  resource_group: claw-deploy
  tags:
    - claw-dev
  needs:
    - build:release-images
  variables:
    <<: *ci_production_docker
    CLAW_RELEASE_TAG: "release-${CI_COMMIT_SHORT_SHA}"
    CLAW_CI_REQUIRE_LLM_BOOTSTRAP: "1"
  script:
    - cd "${CI_PROJECT_DIR:-/home/gitlab-runner/claw-code}"
    - git fetch origin && git checkout main && git pull --ff-only origin main
    - ./deploy/stack/lib/render-env-from-ci.sh
    - ./deploy/stack/gateway.sh up --release "${CLAW_RELEASE_TAG}"
    - ./deploy/stack/lib/admin-solve-e2e.sh 1 ping
  timeout: 2h
