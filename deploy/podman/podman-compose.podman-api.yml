# Overlay: host Podman API for CLAW_SOLVE_ISOLATION=podman_pool (default). Omit via CLAW_SOLVE_ISOLATION=inprocess.
# Author: kejiqing
services:
  gateway-rs:
    volumes:
      - "${PODMAN_HOST_SOCK}:/run/claw-podman/podman.sock:ro"
    environment:
      CONTAINER_HOST: unix:///run/claw-podman/podman.sock
