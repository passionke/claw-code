# Pool daemon runs in compose (same GATEWAY_IMAGE); gateway dials claw-pool-daemon:9943.
# Host paths in bind mounts must match CLAW_POOL_RPC_HOST_WORK_ROOT (see compose-include). Author: kejiqing
services:
  claw-pool-daemon:
    image: ${GATEWAY_IMAGE}
    container_name: claw-pool-daemon
    restart: unless-stopped
    # docker_pool: prepare_guest_for_mount_propagation needs host mount(2) on bind-mounted work_root (rshared → worker rslave). Author: kejiqing
    privileged: true
    entrypoint: ["/usr/local/bin/claw-pool-daemon"]
    env_file:
      - ../../.env
      - ./.claw-worker-llm.env
      - ./.claw-pool-daemon.env
      - ./.claw-pool-worker.env
      # Same CLAW_POOL_ID / CLAW_POOL_ADVERTISE_HOST as gateway (written by gateway.sh up). kejiqing
      - ./.claw-pool-rpc/pool-registry.env
    environment:
      CLAW_POOL_DAEMON_TCP_BIND: "0.0.0.0:${CLAW_POOL_DAEMON_PORT:-9943}"
      CLAW_POOL_HTTP_BIND: "0.0.0.0:${CLAW_POOL_HTTP_PORT:-9944}"
    volumes:
      - "${CLAW_CONTAINER_SOCKET}:${CLAW_CONTAINER_SOCKET}"
      # Image docker.io is API 1.41; Docker Engine ≥29 requires client ≥1.44 — use host CLI. Author: kejiqing
      - /usr/bin/docker:/usr/bin/docker:ro
      # rshared: pool daemon mount(8) on work_root must reach host + worker rslave guest bind. Author: kejiqing
      - type: bind
        source: ${CLAW_POOL_WORK_ROOT_BIND_SRC}
        target: ${CLAW_POOL_WORK_ROOT_BIND_SRC}
        bind:
          propagation: shared
      - "${CLAW_REPO_ROOT}/.env:${CLAW_REPO_ROOT}/.env:ro"
    ports:
      - "127.0.0.1:${CLAW_POOL_DAEMON_PORT:-9943}:${CLAW_POOL_DAEMON_PORT:-9943}"
      - "127.0.0.1:${CLAW_POOL_HTTP_PORT:-9944}:${CLAW_POOL_HTTP_PORT:-9944}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 1 bash -c 'echo > /dev/tcp/127.0.0.1/${CLAW_POOL_DAEMON_PORT:-9943}'",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  gateway-rs:
    depends_on:
      claw-pool-daemon:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
