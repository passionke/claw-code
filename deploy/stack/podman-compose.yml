services:
  gateway-rs:
    image: ${GATEWAY_IMAGE}
    container_name: claw-gateway-rs
    restart: unless-stopped
    env_file:
      # Human-maintained env: repo root `.env` only (`CLAW_ALLOWED_TOOLS` etc.). Do not add deploy/stack/.env.
      # Paths relative to this file's directory: `deploy/stack/` → `../..` is repo root.
      - ../../.env
      # Written by compose-include (up.sh / start-with-tap.sh / down.sh). Do not set
      # CLAW_POOL_WORK_ROOT_HOST in `environment:` with empty ${…} — it overrides env_file and breaks worker bind mounts.
      - ./.claw-pool-workspace.env
    environment:
      CLAW_HTTP_ADDR: 0.0.0.0:8080
      CLAW_BIN: /usr/local/bin/claw
      CLAW_WORK_ROOT: /var/lib/claw/workspace
      # Session sid↔workspace SQLite: bind-mount ./claw-gateway-sessions (see volumes). Override in `.env` if needed.
      CLAW_GATEWAY_SESSION_DB: ${CLAW_GATEWAY_SESSION_DB:-/var/lib/claw/gateway-sessions/gateway-sessions.sqlite}
      CLAW_SOLVE_ISOLATION: ${CLAW_SOLVE_ISOLATION:-podman_pool}
      # Pool sizing / image: explicit defaults so a bare `podman compose` still gets worker settings when
      # project-dir `.env` is missing (always prefer `./deploy/stack/gateway.sh up` from repo root with `.env`).
      CLAW_POOL_SIZE_CAP: ${CLAW_POOL_SIZE_CAP:-4}
      CLAW_PODMAN_POOL_SIZE: ${CLAW_PODMAN_POOL_SIZE:-4}
      CLAW_PODMAN_POOL_MIN_IDLE: ${CLAW_PODMAN_POOL_MIN_IDLE:-1}
      CLAW_PODMAN_IMAGE: ${CLAW_PODMAN_IMAGE:-claw-gateway-worker:local}
      # Do not list CLAW_PODMAN_EXTRA_ARGS / CLAW_DOCKER_EXTRA_ARGS / CLAW_MCP_TOOL_CALL_TIMEOUT_MS
      # here with "${VAR:-}" — compose interpolation does not read ../../.env, so empty defaults override env_file.
      CLAW_CONFIG_FILE: /app/.claw.json
      CLAW_TIMEOUT_SECONDS: ${CLAW_TIMEOUT_SECONDS}
      CLAW_LOG_FORMAT: json
      CLAW_LOG_LEVEL: ${CLAW_LOG_LEVEL:-info}
      CLAW_TRACE_ENABLED: ${CLAW_TRACE_ENABLED:-1}
      CLAW_TRACE_DIR: /var/log/claw/traces
      CLAW_SSE_LOG_FILE: /var/log/claw/sse-debug.log
    ports:
      - "${GATEWAY_HOST_PORT}:8080"
    volumes:
      # Bind mount so podman_pool on the host can use the same path as CLAW_POOL_WORK_ROOT_HOST.
      - ./claw-workspace:/var/lib/claw/workspace
      # Persist gateway session index (sessionId → session_home); survives `compose up --force-recreate`.
      - ./claw-gateway-sessions:/var/lib/claw/gateway-sessions
      - ${CLAW_HOST_LOG_DIR:-./claw-logs}:/var/log/claw
      - ../../.claw.json:/app/.claw.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz | grep -q '\"ok\":true'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  ag-ui-bridge:
    image: ${GATEWAY_IMAGE}
    container_name: claw-ag-ui-bridge
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/ag-ui-claw-bridge"]
    env_file:
      - ../../.env
    environment:
      CLAW_AGUI_BRIDGE_ADDR: 0.0.0.0:8090
      CLAW_GATEWAY_BASE_URL: http://gateway-rs:8080
    ports:
      - "${CLAW_AGUI_BRIDGE_HOST_PORT:-8090}:8090"
    depends_on:
      gateway-rs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/healthz | grep -q '\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  code-server:
    image: docker.1ms.run/codercom/code-server:latest
    container_name: claw-code-server
    restart: unless-stopped
    user: root
    environment:
      PUID: "1000"
      PGID: "1000"
      PASSWORD: ${CLAW_CODE_SERVER_PASSWORD:-claw}
    ports:
      - "${CLAW_CODE_SERVER_PORT:-4101}:8080"
    volumes:
      # Read-only workspace mirror (Phase 2). Author: kejiqing
      - ./claw-workspace:/home/coder/workspace:ro
    profiles:
      - code-server
